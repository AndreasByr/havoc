name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm --filter @guildora/hub test
      - run: pnpm audit --audit-level=high

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag metadata
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD~20..HEAD 2>/dev/null || git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}

  docker-publish:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        app: [hub, web, bot]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag info
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          # Extract floating tag: v0.1.0-alpha -> alpha, v1.0.0 -> latest
          if [[ "$TAG" =~ -([a-zA-Z]+) ]]; then
            echo "channel=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ghcr.io/guildora/guildora-${{ matrix.app }}:${{ steps.tag.outputs.version }}
            ghcr.io/guildora/guildora-${{ matrix.app }}:${{ steps.tag.outputs.channel }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
